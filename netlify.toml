[build]
  command = "npm run build"
  functions = "/.next/server"
  publish = ".next/static"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/*"
  to = "/.next/index.html"
  status = 200

[[headers]]
  for = "/.next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache"
